<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>glint-toast · Mobil</title>
<link rel="stylesheet" href="glint-toast.css">
<link rel="stylesheet" href="../glint-input-library/glint-input.css">
<style>
:root{--accent:#10b981;--bg:#080b0f;--panel:#11161c;--ink:#e9eef3;--ink-2:#9aa6b2;--ink-3:#616d7a;--line:#1f262e;--bs-primary:#059669;--fd:system-ui,-apple-system,"Segoe UI Variable Display","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;--fb:system-ui,-apple-system,"Segoe UI Variable Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;}
*{box-sizing:border-box}html,body{margin:0}
body{background:radial-gradient(120% 80% at 50% -10%,color-mix(in srgb,var(--accent) 14%,transparent),transparent 60%),var(--bg);color:var(--ink);font-family:var(--fb);min-height:100dvh;padding:env(safe-area-inset-top) 0 calc(28px + env(safe-area-inset-bottom))}
.appbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:11px;padding:14px 18px;background:color-mix(in srgb,var(--bg) 80%,transparent);-webkit-backdrop-filter:blur(14px) saturate(160%);backdrop-filter:blur(14px) saturate(160%);border-bottom:1px solid var(--line)}
.mk{width:28px;height:28px;border-radius:8px;background:radial-gradient(120% 120% at 25% 15%,#5eead4,var(--bs-primary));box-shadow:0 0 0 1px rgba(16,185,129,.3),0 6px 16px -6px var(--accent)}
.nm{font-family:var(--fd);font-weight:800;font-size:1.05rem;letter-spacing:-.02em}.tg{margin-left:auto;font-size:.62rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);border:1px solid var(--line);border-radius:99px;padding:4px 9px}
.scroll{padding:18px 16px;max-width:460px;margin:0 auto}
.lead{font-family:var(--fd);font-weight:700;font-size:1.5rem;letter-spacing:-.025em;margin:6px 0 2px}.lead .g{color:var(--accent)}
.sub{color:var(--ink-2);font-size:.92rem;margin:0 0 20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 16px;margin-bottom:16px}
.card>h2{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0 0 14px;display:flex;align-items:center;gap:8px}
.card>h2::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtn{font:inherit;font-weight:600;font-size:.9rem;width:100%;padding:13px 14px;border-radius:11px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--ink);transition:transform .14s cubic-bezier(.22,1,.36,1),border-color .18s}
.mbtn:active{transform:scale(.97)}.mbtn--p{background:var(--bs-primary);color:#fff;border-color:transparent}
.glint-input-group{--glint-label-bg:var(--panel)}
.hint{color:var(--ink-3);font-size:.8rem;margin:14px 4px 0;text-align:center}
</style>
</head>
<body>
<header class="appbar"><span class="mk"></span><span class="nm">Glint</span><span class="tg">Toast · Mobil</span></header>
<main class="scroll">
    <h1 class="lead">Bildirimler, <span class="g">mobilde</span> de.</h1>
    <p class="sub">Bir düğmeye dokun: bildirim sağ üstte belirir. Yığılır, hover/dokunmada duraklar.</p>
    <section class="card">
        <h2>Türler</h2>
        <div class="grid">
            <button class="mbtn mbtn--p" id="t-mo-success" type="button">Başarılı</button>
            <button class="mbtn" id="t-mo-error" type="button">Hata</button>
            <button class="mbtn" id="t-mo-warning" type="button">Uyarı</button>
            <button class="mbtn" id="t-mo-info" type="button">Bilgi</button>
        </div>
    </section>
    <section class="card">
        <h2>Yığın & çoklu</h2>
        <div class="grid">
            <button class="mbtn" id="t-mo-stack" type="button">3 bildirim</button>
            <button class="mbtn" id="t-mo-multi" type="button">Çoklu mesaj</button>
            <button class="mbtn" id="t-mo-dismiss" type="button" style="grid-column:span 2">Tümünü kapat</button>
        </div>
    </section>
    <section class="card">
        <h2>Alan köprüsü</h2>
        <div style="margin-bottom:14px" class="glint-input-group">
            <input class="glint-input" id="m-email" type="email" value="ada@glint">
            <label class="glint-label" for="m-email">E-posta</label>
        </div>
        <button class="mbtn" id="t-mo-field" type="button">Alan hatası gönder (smart)</button>
    </section>
    <p class="hint">glint-toast <span class="glint-ver">v1.5.0</span> · sıfır bağımlılık</p>
</main>
<script src="glint-toast.js"></script>
<script src="../glint-input-library/glint-input.js"></script>
<script>
(function(){
  var _gv=(window.Glint&&window.Glint.version)?"v"+window.Glint.version:"";
  if(_gv)document.querySelectorAll(".glint-ver").forEach(function(e){e.textContent=_gv;});
  function T(){return window.Glint&&window.Glint.Toast;}
  var msg={success:'Kaydedildi!',error:'Bağlantı hatası, tekrar dene.',warning:'Oturum birazdan kapanacak.',info:'Yeni sürüm var.'};
  ['success','error','warning','info'].forEach(function(k){var b=document.getElementById('t-mo-'+k);if(b)b.addEventListener('click',function(){if(T())Glint.Toast[k](msg[k]);});});
  var s=document.getElementById('t-mo-stack');if(s)s.addEventListener('click',function(){if(!T())return;Glint.Toast.success('Profil güncellendi.');Glint.Toast.info('Yeni sürüm var.');Glint.Toast.warning('Oturum birazdan kapanacak.');});
  var m=document.getElementById('t-mo-multi');if(m)m.addEventListener('click',function(){if(!T())return;Glint.Toast.show('warning',[{message:'Parola en az 8 karakter.'},{message:'Bir büyük harf gerekli.'},{message:'Bir rakam gerekli.'}]);});
  var d=document.getElementById('t-mo-dismiss');if(d)d.addEventListener('click',function(){if(T())Glint.Toast.dismissAll();});
  var f=document.getElementById('t-mo-field');if(f)f.addEventListener('click',function(){if(!T())return;if(Glint.configure)Glint.configure({fieldErrors:'smart'});Glint.Toast.error('Geçerli bir e-posta girin.','m-email');Glint.Toast.error('Form gönderilemedi.');});
})();
</script>
</body>
</html>
